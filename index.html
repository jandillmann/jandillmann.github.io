<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jan Dillman</title>
    <meta name="color-scheme" content="light dark" />
    <style>
      @font-face {
        font-family: "Space Grotesk";
        font-style: normal;
        font-weight: 100 700;
        font-display: swap;
        src: url("SpaceGrotesk[wght].woff2") format("woff2");
      }

      :root {
        color-scheme: light dark;
        --bg: #f4f1ec;
        --fg: #2a2f33;
        --link: #2b5a6b;
        --link-hover: #1f4857;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #101417;
          --fg: #d9d3c8;
          --link: #9cc3d1;
          --link-hover: #c0dbe4;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        background: radial-gradient(120% 120% at 30% 20%, #fff1, transparent 60%), var(--bg);
        color: var(--fg);
        font-family: "Space Grotesk", system-ui, sans-serif;
        text-rendering: optimizeLegibility;
      }

      .wrap {
        text-align: center;
        padding: 2.5rem 1.5rem 3rem;
      }

      h1 {
        margin: 0 0 1.25rem;
        font-size: clamp(3.5rem, 12vw, 9rem);
        letter-spacing: 0.08em;
        font-weight: 600;
      }

      .links {
        display: inline-flex;
        gap: 1.5rem;
        font-size: 1.05rem;
      }

      .links a {
        color: var(--link);
        text-decoration: underline;
        text-decoration-thickness: 2px;
        text-underline-offset: 0.3em;
      }

      .links a:hover,
      .links a:focus-visible {
        color: var(--link-hover);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Jan Dillmann</h1>
      <nav class="links" aria-label="Profiles">
        <a href="http://www.linkedin.com/in/jandillmann">LinkedIn</a>
        <a href="http://www.xing.com/profile/Jan_Dillmann">Xing</a>
        <a href="http://github.com/jandillmann">Github</a>
      </nav>
    </main>
  </body>
</html>
